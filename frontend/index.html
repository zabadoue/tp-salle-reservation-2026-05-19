<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Salles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Salles Disponibles</h1>
        <div id="salles-list"></div>
    </div>
    <script>
        const salles = [
            { id: 1, nom: "Salle Alpha", reservee: false },
            { id: 2, nom: "Salle Beta", reservee: true },
            { id: 3, nom: "Salle Gamma", reservee: false }
        ];
        function renderSalles(data) {
            const container = document.getElementById('salles-list');
            container.innerHTML = data.map(salle => `
                <div class="salle-card">
                    <div><strong>${salle.nom}</strong><br><small>${salle.reservee ? 'Occupée' : 'Disponible'}</small></div>
                    <button class="btn-reserve" onclick="reserver(${salle.id})" ${salle.reservee ? 'disabled' : ''}>
                        ${salle.reservee ? 'Réservée' : 'Réserver'}
                    </button>
                </div>
            `).join('');
        }
        function reserver(id) {
            alert("Salle " + id + " réservée !");
            const salle = salles.find(s => s.id === id);
            if (salle) { salle.reservee = true; renderSalles(salles); }
        }
        renderSalles(salles);
    </script>
</body>
</html>
