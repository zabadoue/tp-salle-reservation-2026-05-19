<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Salles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Gestion des Salles</h1>
        <div id="liste-salles"></div>
    </div>
    <script>
        const container = document.getElementById('liste-salles');
        async function chargerSalles() {
            const res = await fetch('http://localhost:8000/salles');
            const salles = await res.json();
            container.innerHTML = '';
            salles.forEach(s => {
                const div = document.createElement('div');
                div.className = 'salle-card';
                div.innerHTML = `<span>${s.nom} (Capacité: ${s.capacite})</span><button id="btn-${s.id}" onclick="reserver(${s.id})">Réserver</button>`;
                container.appendChild(div);
            });
        }
        async function reserver(id) {
            await fetch(`http://localhost:8000/reserver/${id}`, {method: 'POST'});
            chargerSalles();
        }
        chargerSalles();
    </script>
</body>
</html>
