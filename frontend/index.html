<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système de Gestion de Salles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Gestion des Salles de Réunion</h1>
    </header>

    <main>
        <!-- Section affichant la liste des salles disponibles -->
        <section id="section-disponibles">
            <h2>Salles Disponibles</h2>
            <div id="grille-salles" class="grid-container">
                <!-- Les cartes .card-salle seront injectées ici dynamiquement -->
            </div>
        </section>

        <!-- Section pour les interactions utilisateur -->
        <section id="section-actions">
            <h2>Actions</h2>
            <div class="actions-container">
                <button id="btn-refresh" class="btn-action">Actualiser la liste</button>
            </div>
        </section>
    </main>

</body>
</html>
